<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://kit.fontawesome.com/645d392c03.js" crossorigin="anonymous"></script>
</head>
<body>
     <main class="container">
         <h2>Login</h2>
         <form>
            <div class="input-field">
                <input autocomplete="off" autofocus type="text" name="username" id="username" placeholder="Enter Your Username">
                <div class="underline"></div>
            </div>
            <div class="input-field">
                <input autocomplete="off" type="password" name="password" id="password" placeholder="Enter Your Password">
                <div class="underline"></div>
            </div>

            <input type="submit" value="Continue">
         </form>

         <div class="footer">
             <span>Or Connect With Social Media</span>
             <div class="social-field">
                 <div class="social-field twitter">
                     <a href="#">
                        <i class="fab fa-twitter"></i>
                        Sign in with Twitter
                     </a>
                 </div>
                 <div class="social-field facebook">
                     <a href="#">
                         <i class="fab fa-facebook"></i>
                         Sign in with Facebook
                    </a>
                 </div>
             </div>
         </div>
     </main>
</body>
</html>
